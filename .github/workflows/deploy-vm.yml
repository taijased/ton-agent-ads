name: Deploy VM Backend

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: deploy-vm-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    env:
      VM_HOST: ${{ secrets.VM_HOST }}
      VM_PORT: ${{ secrets.VM_PORT }}
      VM_USER: ${{ secrets.VM_USER }}
      VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || github.event.workflow_run.head_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate VM secrets
        run: |
          test -n "${VM_HOST}" || { echo "Missing VM_HOST" >&2; exit 1; }
          test -n "${VM_USER}" || { echo "Missing VM_USER" >&2; exit 1; }
          test -n "${VM_SSH_KEY}" || { echo "Missing VM_SSH_KEY" >&2; exit 1; }

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${VM_SSH_KEY}" > ~/.ssh/id_vm_deploy
          chmod 600 ~/.ssh/id_vm_deploy

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Build release archive
        run: |
          ARCHIVE_PATH="/tmp/ton-agent-ads-${{ github.sha }}.tar.gz"
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='**/node_modules' \
            --exclude='dist' \
            --exclude='**/dist' \
            --exclude='artifacts' \
            -czf "${ARCHIVE_PATH}" .

      - name: Upload release archive
        run: |
          if [ -z "${VM_PORT}" ]; then
            VM_PORT='22'
          fi

          scp -i ~/.ssh/id_vm_deploy -P "${VM_PORT}" -o StrictHostKeyChecking=accept-new \
            "/tmp/ton-agent-ads-${{ github.sha }}.tar.gz" \
            "${VM_USER}@${VM_HOST}:/tmp/"

      - name: Deploy release on VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.VM_HOST }}
          username: ${{ env.VM_USER }}
          key: ${{ env.VM_SSH_KEY }}
          port: ${{ env.VM_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_ROOT="/opt/ton-agent-ads"
            RELEASE_DIR="${APP_ROOT}/releases/${{ github.sha }}"
            ARCHIVE_PATH="/tmp/ton-agent-ads-${{ github.sha }}.tar.gz"
            ENV_PATH="${APP_ROOT}/shared/.env"

            sudo mkdir -p "${APP_ROOT}/releases" "${APP_ROOT}/shared"
            sudo chown -R "${USER}:${USER}" "${APP_ROOT}"

            {
              printf '%s\n' "BOT_TOKEN=${{ secrets.BOT_TOKEN }}"
              printf '%s\n' "API_BASE_URL=${{ vars.API_BASE_URL }}"
              printf '%s\n' "HOST=${{ secrets.HOST }}"
              printf '%s\n' "PORT=${{ secrets.PORT }}"
              printf '%s\n' "NODE_ENV=${{ secrets.NODE_ENV }}"
              printf '%s\n' "POSTGRES_USER=${{ vars.POSTGRES_USER }}"
              printf '%s\n' "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}"
              printf '%s\n' "POSTGRES_DB=${{ secrets.POSTGRES_DB }}"
              printf '%s\n' "DATABASE_URL=${{ secrets.DATABASE_URL }}"
              printf '%s\n' "TG_API_ID=${{ secrets.TG_API_ID }}"
              printf '%s\n' "TG_API_HASH=${{ secrets.TG_API_HASH }}"
              printf '%s\n' "TG_SESSION_STRING=${{ secrets.TG_SESSION_STRING }}"
              printf '%s\n' "OPEN_AI_TOKEN=${{ secrets.OPEN_AI_TOKEN }}"
              printf '%s\n' "OPEN_AI_MODEL=${{ vars.OPEN_AI_MODEL }}"
            } > "${ENV_PATH}"

            rm -rf "${RELEASE_DIR}"
            mkdir -p "${RELEASE_DIR}"
            tar -xzf "${ARCHIVE_PATH}" -C "${RELEASE_DIR}"
            bash "${RELEASE_DIR}/deploy/server-deploy.sh" "${RELEASE_DIR}"
            rm -f "${ARCHIVE_PATH}"
